name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BETTER_AUTH_SECRET: ci-disposable-better-auth-secret-32chars-min
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_disposable_key_that_cannot_send
      AUTH_EMAIL_FROM: accounts@auth.example.com
      AUTH_EMAIL_REPLY_TO: reply@example.com
      DATABASE_URL: postgresql://zedarchive_app:zedarchive_ci_password@localhost:5432/zedarchive_test
      DATABASE_MIGRATION_URL: postgresql://zedarchive_app:zedarchive_ci_password@localhost:5432/zedarchive_test
      DATABASE_TEST_URL: postgresql://zedarchive_app:zedarchive_ci_password@localhost:5432/zedarchive_test

    services:
      postgres:
        image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: zedarchive_test
          POSTGRES_PASSWORD: zedarchive_ci_password
          POSTGRES_USER: zedarchive_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Validate development catalogue seed
        run: npm run db:seed:check

      - name: Validate Wikidata import inputs
        run: npm run catalogue:import:wikidata:check

      - name: Verify migration is current
        run: |
          npm run db:generate
          git diff --exit-code -- drizzle

      - name: Unit test
        run: npm test

      - name: Database integration test
        run: npm run test:integration

      - name: Build
        run: npm run build
